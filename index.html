<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bricks Admin Panel</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .top-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    button {
      padding: 8px 14px;
      margin: 4px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      overflow-x: auto;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
    }

    th {
      background: #333;
      color: white;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 6px;
    }

    .action-btns button {
      display: block;
      margin-bottom: 5px;
      width: 100%;
    }

    #status {
      text-align: center;
      font-weight: bold;
      margin: 10px 0;
    }

    @media (max-width: 900px) {
      table {
        font-size: 12px;
      }
    }
  </style>
</head>
<body id="body">

  <h1>Bricks Admin Panel</h1>

  <div class="top-bar">
    <button onclick="loadData()">🔄 Refresh Data</button>
    <button onclick="addNewRow()">➕ Add New Row</button>
  </div>

  <p id="status">Loading...</p>

  <div style="overflow-x:auto;">
    <table id="dataTable">
      <thead>
        <tr>
          <th>Row</th>
          <th>Timestamp</th>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Area</th>
          <th>Quantity</th>
          <th>Message</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbw5PMs-DIShd87hArHtTRr6-QAcL8U3Dqyz22zZn3hMGS8EVJyoNhfDu4nDIgcvoUMdTg/exec";

    async function loadData() {
      document.getElementById("status").textContent = "Loading data...";

      try {
        const response = await fetch(scriptURL + "?action=read");
        const result = await response.json();

        if (result.status === "success") {
          renderTable(result.data);
          document.getElementById("status").textContent = "Data loaded successfully!";
        } else {
          document.getElementById("status").textContent = "Error loading data.";
        }
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "Failed to load data.";
      }
    }

    function renderTable(data) {
      const tbody = document.querySelector("#dataTable tbody");
      tbody.innerHTML = "";

      data.forEach(row => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
          <td>${row.rowNumber}</td>
          <td>${row.timestamp}</td>
          <td><input type="text" value="${escapeHtml(row.name)}" id="name-${row.rowNumber}"></td>
          <td><input type="text" value="${escapeHtml(row.email)}" id="email-${row.rowNumber}"></td>
          <td><input type="text" value="${escapeHtml(row.phone)}" id="phone-${row.rowNumber}"></td>
          <td><textarea id="area-${row.rowNumber}">${escapeHtml(row.address)}</textarea></td>
          <td><input type="text" value="${escapeHtml(row.quantity)}" id="quantity-${row.rowNumber}"></td>
          <td><textarea id="message-${row.rowNumber}">${escapeHtml(row.message)}</textarea></td>
          <td class="action-btns">
            <button onclick="updateRow(${row.rowNumber})">💾 Save</button>
            <button onclick="deleteRow(${row.rowNumber})">🗑 Delete</button>
          </td>
        `;

        tbody.appendChild(tr);
      });
    }

    async function updateRow(rowNumber) {
      const formData = new FormData();
      formData.append("action", "update");
      formData.append("rowNumber", rowNumber);
      formData.append("name", document.getElementById(`name-${rowNumber}`).value);
      formData.append("email", document.getElementById(`email-${rowNumber}`).value);
      formData.append("phone", document.getElementById(`phone-${rowNumber}`).value);
      formData.append("address", document.getElementById(`area-${rowNumber}`).value);
      formData.append("quantity", document.getElementById(`quantity-${rowNumber}`).value);
      formData.append("message", document.getElementById(`message-${rowNumber}`).value);

      document.getElementById("status").textContent = `Updating row ${rowNumber}...`;

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.status === "success") {
          document.getElementById("status").textContent = `Row ${rowNumber} updated successfully!`;
          loadData();
        } else {
          document.getElementById("status").textContent = "Update failed: " + result.message;
        }
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "Update request failed.";
      }
    }

    async function deleteRow(rowNumber) {
      if (!confirm(`Delete row ${rowNumber}?`)) return;

      const formData = new FormData();
      formData.append("action", "delete");
      formData.append("rowNumber", rowNumber);

      document.getElementById("status").textContent = `Deleting row ${rowNumber}...`;

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.status === "success") {
          document.getElementById("status").textContent = `Row ${rowNumber} deleted successfully!`;
          loadData();
        } else {
          document.getElementById("status").textContent = "Delete failed: " + result.message;
        }
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "Delete request failed.";
      }
    }

    async function addNewRow() {
      const name = prompt("Enter Name:");
      if (name === null) return;

      const email = prompt("Enter Email:") || "";
      const phone = prompt("Enter Phone:") || "";
      const area = prompt("Enter Area:") || "";
      const quantity = prompt("Enter Quantity:") || "";
      const message = prompt("Enter Message:") || "";

      const formData = new FormData();
      formData.append("action", "add");
      formData.append("name", name);
      formData.append("email", email);
      formData.append("phone", phone);
      formData.append("address", area);
      formData.append("quantity", quantity);
      formData.append("message", message);

      document.getElementById("status").textContent = "Adding new row...";

      try {
        const response = await fetch(scriptURL, {
          method: "POST",
          body: formData
        });

        const result = await response.json();

        if (result.status === "success") {
          document.getElementById("status").textContent = "New row added successfully!";
          loadData();
        } else {
          document.getElementById("status").textContent = "Add failed: " + result.message;
        }
      } catch (error) {
        console.error(error);
        document.getElementById("status").textContent = "Add request failed.";
      }
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }
    async function verify() {
  const scriptURL = "https://script.google.com/macros/s/AKfycbzpmCxAxanPbIg9DLZIzTkH-jvcTBVNvQ-eIJAxNYrWUs24fmzRKjnBHQJnADN1T2BXSA/exec"; // paste Apps Script web app URL

  let auth = "";
  let triesLeft = 3;
  let attemptNumber = 1; // 1st, 2nd, 3rd entered attempt

  while (triesLeft > 0) {
    auth = prompt("enter password. tries left " + triesLeft);

    // If user presses Cancel
    if (auth === null) {
      document.getElementById("body").innerHTML = "<h1>erased</h1>";
      return false;
    }

    try {
      const formData = new URLSearchParams();
      formData.append("action", "checkPassword");
      formData.append("password", auth);

      const response = await fetch(scriptURL, {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (data.success) {
        // 1st attempt success
        if (attemptNumber === 1) {
          alert("welcome admin");
          return true;
        }

        // 2nd attempt success -> ask optional password change
        if (attemptNumber === 2) {
          alert("welcome admin");

          const wantChange = confirm("You logged in on 2nd attempt. Do you want to change password?");

          if (wantChange) {
            const changed = await changePasswordFlow(scriptURL, auth, false);
            if (!changed) {
              // if user started change but failed/cancelled, still allow login
              alert("Password not changed. Continuing login.");
            }
          }

          return true;
        }

        // 3rd attempt success -> force password change
        if (attemptNumber === 3) {
          alert("welcome admin");
          alert("You logged in on 3rd attempt. You must change your password now.");

          const changed = await changePasswordFlow(scriptURL, auth, true);

          if (changed) {
            return true;
          } else {
            // if force-change failed or cancelled, erase page
            document.getElementById("body").innerHTML = "<h1>erased</h1>";
            return false;
          }
        }
      } else {
        triesLeft--;
        attemptNumber++;

        if (triesLeft === 0) {
          document.getElementById("body").innerHTML = "<h1>erased</h1>";
          return false;
        }
      }

    } catch (error) {
      alert("Connection error: " + error.message);
      document.getElementById("body").innerHTML = "<h1>erased</h1>";
      return false;
    }
  }

  document.getElementById("body").innerHTML = "<h1>erased</h1>";
  return false;
}

// Password change flow
async function changePasswordFlow(scriptURL, currentPassword, forceChange) {
  while (true) {
    let newPassword = prompt("Enter new password:");

    // User cancelled
    if (newPassword === null) {
      if (forceChange) {
        alert("Password change is required.");
        continue;
      } else {
        return false;
      }
    }

    newPassword = newPassword.trim();

    if (newPassword === "") {
      alert("New password cannot be empty.");
      if (forceChange) {
        continue;
      } else {
        return false;
      }
    }

    if (newPassword === currentPassword) {
      alert("New password cannot be same as old password.");
      if (forceChange) {
        continue;
      } else {
        return false;
      }
    }

    const confirmPassword = prompt("Confirm new password:");

    if (confirmPassword === null) {
      if (forceChange) {
        alert("Password confirmation is required.");
        continue;
      } else {
        return false;
      }
    }

    if (newPassword !== confirmPassword) {
      alert("Passwords do not match.");
      if (forceChange) {
        continue;
      } else {
        return false;
      }
    }

    try {
      const formData = new URLSearchParams();
      formData.append("action", "changePassword");
      formData.append("oldPassword", currentPassword);
      formData.append("newPassword", newPassword);

      const response = await fetch(scriptURL, {
        method: "POST",
        body: formData
      });

      const data = await response.json();

      if (data.success) {
        alert("Password changed successfully.");
        return true;
      } else {
        alert(data.message || "Password change failed.");
        if (forceChange) {
          continue;
        } else {
          return false;
        }
      }

    } catch (error) {
      alert("Error changing password: " + error.message);
      if (forceChange) {
        continue;
      } else {
        return false;
      }
    }
  }
}

verify();
    loadData();
  </script>

</body>
</html>
